version: '3.9'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./datasets:/app/../datasets:ro
      - ./reports:/app/../reports
      - db_data:/app/../ub_detector.db
    environment:
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000,http://localhost
      - CLANG_PATH=clang
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
